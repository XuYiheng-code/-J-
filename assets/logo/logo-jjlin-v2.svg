<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#C4B5FD"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" fill="#0A0A0A"/>

  <!-- JJ with circle -->
  <circle cx="55" cy="60" r="40" fill="none" stroke="url(#purpleGlow)" stroke-width="2"/>
  <text x="30" y="75" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">JJ</text>

  <!-- Lin -->
  <text x="110" y="75" font-family="Arial, sans-serif" font-size="36" font-weight="300" fill="#FFFFFF">Lin</text>

  <!-- Subtitle -->
  <text x="200" y="75" font-family="Arial, sans-serif" font-size="12" fill="#8B5CF6" letter-spacing="4">MUSIC</text>

  <!-- Music notes -->
  <text x="30" y="30" font-size="14" fill="#D4AF37">♫</text>
  <text x="80" y="100" font-size="14" fill="#D4AF37">♪</text>
</svg>