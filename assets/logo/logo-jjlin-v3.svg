<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="deepPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B3FA0"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" fill="#0A0A0A"/>

  <!-- Chinese: 林俊杰 -->
  <text x="20" y="75" font-family="serif" font-size="52" font-weight="bold" fill="#FFFFFF">林俊杰</text>

  <!-- English subtitle -->
  <text x="220" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#deepPurple)">JJ LIN</text>

  <!-- Decorative line -->
  <line x1="20" y1="90" x2="380" y2="90" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Music symbols -->
  <text x="360" y="60" font-size="20" fill="#D4AF37">♬</text>
  <text x="370" y="85" font-size="16" fill="#8B5CF6">♪</text>
</svg>