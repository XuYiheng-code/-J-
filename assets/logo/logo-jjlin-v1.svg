<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#E8C872"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6B3FA0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" fill="#0A0A0A"/>

  <!-- JJ Text - Stylized -->
  <text x="30" y="80" font-family="Georgia, serif" font-size="60" font-weight="bold" fill="url(#goldGradient)">JJ</text>

  <!-- Lin Text -->
  <text x="120" y="80" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#FFFFFF">LIN</text>

  <!-- Decorative underline -->
  <rect x="120" y="90" width="180" height="2" fill="url(#purpleGradient)"/>

  <!-- Music note decoration -->
  <text x="370" y="70" font-size="24" fill="#8B5CF6">♪</text>
</svg>